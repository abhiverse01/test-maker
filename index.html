<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Test-Maker Engine </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container" id="app">
        <!-- Header Section -->
        <header class="header">
            <div class="title">
                <h1>⚡ Test-Maker Engine</h1>
                <p id="subTitle">Initializing modules...</p>
            </div>
            <div class="badge-panel">
                <div class="timer-box">
                    <span class="timer-label">TIME</span>
                    <div class="timer" id="timerDisplay">00:00</div>
                </div>
                <button class="dark-toggle" id="darkToggle" aria-label="Toggle Dark Mode">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Test View -->
        <main id="testView" class="main-card">
            <div class="question-palette" id="paletteContainer">
                <div class="palette-header">
                    <span class="palette-title">Navigator</span>
                    <div class="palette-legend">
                        <span class="legend-item answered">Answered</span>
                        <span class="legend-item unanswered">Unanswered</span>
                    </div>
                </div>
                <div class="grid-buttons" id="questionGrid"></div>
            </div>

            <div class="progress-area">
                <span class="question-counter" id="questionCounter">1 / 50</span>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="question-box">
                <div class="question-text" id="questionText">Loading...</div>
                <div class="options-grid" id="optionsContainer"></div>
            </div>

            <div class="action-bar">
                <div class="nav-buttons">
                    <button id="prevBtn" class="btn-nav">◀ Prev</button>
                    <button id="nextBtn" class="btn-nav">Next ▶</button>
                </div>
                <div class="action-group-right">
                    <button id="clearBtn" class="btn-text">Clear</button>
                    <button id="submitBtn" class="btn-primary">Finish Test 🏁</button>
                </div>
            </div>
            <div class="secondary-actions">
                <button id="newTestBtn" class="btn-secondary">🔄 Randomize New Test</button>
            </div>
        </main>

        <!-- Results View -->
        <section id="resultView" class="main-card hidden">
            <div class="results-header">
                <h2>Analysis Complete</h2>
                <div class="score-big" id="finalScore">0/50</div>
                <p class="score-message" id="scoreMessage">Calculating performance...</p>
            </div>
            <div id="resultsList" class="results-list"></div>
            <div class="result-actions">
                <button id="restartFromResultsBtn" class="btn-primary">Take New Test</button>
            </div>
        </section>

        <footer>Test-Maker v3 · Modular Architecture · LocalStorage Enabled · Abhishek Shah</footer>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ GODMODE TECH MCQ ENGINE ⚡ – 1000 BANK · 50 DRAWN · EPIC SUMMARY</title>
    <style>
        /* -------------------- GODMODE STYLE – DARK/NEON TOGGLE, SMOOTH, RESPONSIVE -------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 1rem;
        }

        /* Light / Dark variables – toggled by .dark-mode class */
        :root {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --accent: #2563eb;
            --accent-glow: #3b82f6;
            --border: #cbd5e1;
            --card-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15), 0 8px 15px rgba(0,0,0,0.1);
            --option-hover: #dbeafe;
            --correct-bg: #86efac;
            --wrong-bg: #fecaca;
            --neutral-bg: #e2e8f0;
            --btn-primary: #2563eb;
            --btn-primary-hover: #1d4ed8;
            --btn-secondary: #475569;
            --btn-secondary-hover: #1e293b;
            --progress-fill: #2563eb;
            --progress-bg: #cbd5e1;
        }

        .dark-mode {
            --bg-primary: #0b1120;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #38bdf8;
            --accent-glow: #7dd3fc;
            --border: #334155;
            --card-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.8), 0 8px 15px rgba(0,255,255,0.1);
            --option-hover: #2d3a4f;
            --correct-bg: #14532d;
            --wrong-bg: #7f1d1d;
            --neutral-bg: #334155;
            --btn-primary: #38bdf8;
            --btn-primary-hover: #7dd3fc;
            --btn-secondary: #64748b;
            --btn-secondary-hover: #94a3b8;
            --progress-fill: #38bdf8;
            --progress-bg: #334155;
        }

        .app-container {
            width: 100%;
            max-width: 950px;
            background: var(--bg-secondary);
            border-radius: 2.5rem;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            backdrop-filter: blur(4px);
            border: 1px solid var(--border);
        }

        .header {
            padding: 1.8rem 2.2rem;
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .title p {
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 0.2rem;
            font-size: 0.95rem;
        }

        .badge-panel {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .timer {
            background: var(--neutral-bg);
            padding: 0.5rem 1.3rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--text-primary);
            box-shadow: inset 0 -2px 0 var(--border);
            letter-spacing: 1px;
        }

        .dark-toggle {
            background: var(--neutral-bg);
            border: none;
            border-radius: 40px;
            width: 48px;
            height: 48px;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: 0.2s;
            border: 1px solid var(--border);
        }
        .dark-toggle:hover {
            background: var(--option-hover);
            transform: scale(1.05);
        }

        .main-card {
            padding: 2.2rem;
        }

        .progress-area {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-weight: 600;
            color: var(--text-secondary);
            align-items: center;
        }

        .progress-bar-container {
            flex: 1;
            margin: 0 1.5rem;
            height: 12px;
            background: var(--progress-bg);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--progress-fill);
            border-radius: 20px;
            transition: width 0.2s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .question-counter {
            font-size: 1.1rem;
            background: var(--neutral-bg);
            padding: 0.3rem 1rem;
            border-radius: 30px;
        }

        .question-box {
            margin-bottom: 2.5rem;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text-primary);
            margin-bottom: 2rem;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option-item {
            background: var(--neutral-bg);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 1rem 1.8rem;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .option-item:hover {
            background: var(--option-hover);
            border-color: var(--accent);
            transform: translateX(8px);
            box-shadow: -4px 4px 0 var(--accent);
        }

        .option-item.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .option-prefix {
            font-weight: 800;
            margin-right: 1.5rem;
            width: 28px;
            height: 28px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .selected .option-prefix {
            background: white;
            color: var(--accent);
        }

        input[type="radio"] {
            display: none;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            background: var(--btn-primary);
            color: white;
            border: none;
            padding: 1rem 2.2rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--btn-primary-hover);
            transition: 0.1s linear;
            border: 1px solid rgba(255,255,255,0.2);
            flex: 1 1 auto;
            min-width: 130px;
            letter-spacing: 0.3px;
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--btn-primary-hover);
        }

        button:disabled {
            opacity: 0.4;
            transform: translateY(4px);
            box-shadow: 0 4px 0 var(--btn-secondary-hover);
            pointer-events: none;
        }

        .btn-secondary {
            background: var(--btn-secondary);
            box-shadow: 0 8px 0 var(--btn-secondary-hover);
        }

        .results-panel {
            padding: 1rem 0 2rem 0;
        }

        .score-big {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin: 1rem 0;
        }

        .results-list {
            max-height: 500px;
            overflow-y: auto;
            border-radius: 24px;
            background: var(--neutral-bg);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .result-item {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 1.2rem;
            border-left: 8px solid transparent;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .result-item.correct {
            border-left-color: #22c55e;
        }
        .result-item.wrong {
            border-left-color: #ef4444;
        }

        .result-question {
            font-weight: 600;
            color: var(--text-primary);
        }

        .result-answer {
            margin-top: 0.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            color: var(--text-secondary);
        }

        .restart-btn {
            margin-top: 2rem;
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--neutral-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="header">
            <div class="title">
                <h1>⚡ 1000TECH · MCQ</h1>
                <p>godmode · 50 drawn per test</p>
            </div>
            <div class="badge-panel">
                <div class="timer" id="timerDisplay">00:00</div>
                <button class="dark-toggle" id="darkToggle" aria-label="toggle dark mode">🌙</button>
            </div>
        </div>

        <!-- TEST VIEW (visible by default) -->
        <div id="testView" class="main-card">
            <div class="progress-area">
                <span class="question-counter" id="questionCounter">1 / 50</span>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progressFill" style="width: 2%;"></div>
                </div>
            </div>

            <div class="question-box" id="questionBox">
                <div class="question-text" id="questionText">Loading question...</div>
                <div class="options-grid" id="optionsContainer"></div>
            </div>

            <div class="nav-buttons">
                <button id="prevBtn" class="btn-secondary">◀ PREV</button>
                <button id="nextBtn">NEXT ▶</button>
                <button id="submitBtn" class="btn-secondary" style="background:#a855f7; box-shadow:0 8px 0 #7e22ce;">🏁 FINISH</button>
            </div>
            <div style="margin-top: 1rem; display: flex; justify-content: center;">
                <button id="newTestBtn" class="btn-secondary" style="background:#10b981; box-shadow:0 8px 0 #059669;">🔄 NEW TEST (RANDOM 50)</button>
            </div>
        </div>

        <!-- RESULTS VIEW (hidden by default) -->
        <div id="resultView" class="main-card hidden">
            <h2 style="color: var(--text-primary); margin-bottom: 0.5rem;">📊 FINAL SCORE</h2>
            <div class="score-big" id="finalScore">0 / 50</div>
            <div id="resultsList" class="results-list"></div>
            <button id="restartFromResultsBtn" class="restart-btn btn-secondary">🔄 TAKE NEW TEST</button>
        </div>

        <footer>
            ⚡ 1000 handcrafted tech mcqs · every session fresh 50 · godmode engaged
        </footer>
    </div>

    <script>
        (function() {
            // ---------- GODMODE MCQ ENGINE ----------
            // ---------- 1000 QUESTIONS GENERATOR (deterministic, varied, tech) ----------
            function generateQuestionBank() {
                const bank = [];
                // ---- helper pools for variations ----
                const acronyms = [
                    { code: 'CPU', full: 'Central Processing Unit' }, { code: 'GPU', full: 'Graphics Processing Unit' },
                    { code: 'RAM', full: 'Random Access Memory' }, { code: 'ROM', full: 'Read Only Memory' },
                    { code: 'HDD', full: 'Hard Disk Drive' }, { code: 'SSD', full: 'Solid State Drive' },
                    { code: 'HTTP', full: 'HyperText Transfer Protocol' }, { code: 'FTP', full: 'File Transfer Protocol' },
                    { code: 'SMTP', full: 'Simple Mail Transfer Protocol' }, { code: 'DNS', full: 'Domain Name System' }
                ];
                const progLangs = ['JavaScript', 'Python', 'Java', 'C++', 'C#', 'Ruby', 'Go', 'Rust', 'Swift', 'PHP'];
                const frontend = ['React', 'Angular', 'Vue', 'Svelte', 'jQuery', 'Bootstrap', 'Tailwind', 'Ember', 'Backbone', 'Solid'];
                const dbTech = ['MySQL', 'PostgreSQL', 'MongoDB', 'SQLite', 'Redis', 'Cassandra', 'MariaDB', 'Oracle', 'Firebase', 'DynamoDB'];
                const osNames = ['Linux', 'Windows', 'macOS', 'Android', 'iOS', 'FreeBSD', 'ChromeOS', 'Ubuntu', 'Fedora', 'Debian'];
                const cloud = ['AWS', 'Azure', 'GCP', 'Heroku', 'DigitalOcean', 'Linode', 'Vercel', 'Netlify', 'Cloudflare', 'Alibaba'];
                const concepts = ['OOP', 'functional programming', 'event loop', 'closure', 'hoisting', 'prototype', ' polymorphism', 'inheritance', 'encapsulation', 'abstraction'];
                const randomString = (i) => `v${i*3}`; // just for filler

                // ---- 20 pattern functions that return a question object based on index ----
                const patterns = [
                    (idx) => { // acronym question
                        const a = acronyms[idx % acronyms.length];
                        const dist = [`Central Processing Unit`, `Graphics Card`, `Random Access Memory`, `Hard Drive`]; // fallback
                        const options = [a.full, `Hypertext Processor`, `Graphical Processing Unit`, `Read Access Memory`];
                        // shuffle correct to position 0-3 but keep correct index
                        const correctIdx = 0; // we'll set after shuffle
                        const opts = [a.full, `Hypertext Processor`, `Graphical Processing Unit`, `Read Access Memory`];
                        // randomize based on idx to keep consistent
                        const seed = idx % 4;
                        const shuffled = [];
                        for (let i=0; i<4; i++) shuffled.push(opts[(i+seed) % 4]);
                        const correctIndex = shuffled.indexOf(a.full);
                        return {
                            question: `What does ${a.code} stand for in computing?`,
                            options: shuffled,
                            correct: correctIndex
                        };
                    },
                    (idx) => { // programming language for task
                        const tasks = ['web development', 'data science', 'machine learning', 'mobile apps', 'system programming', 'game dev', 'devops', 'embedded systems', 'backend', 'frontend'];
                        const task = tasks[idx % tasks.length];
                        const lang = progLangs[idx % progLangs.length];
                        const opts = [lang, progLangs[(idx+1)%progLangs.length], progLangs[(idx+2)%progLangs.length], progLangs[(idx+3)%progLangs.length]];
                        // shuffle
                        const seed = idx % 4;
                        const shuffled = [...opts].sort(() => (seed % 2 === 0 ? 1 : -1)); // not perfect but deterministic enough
                        const correctIndex = shuffled.indexOf(lang);
                        return {
                            question: `Which language is most commonly associated with ${task}?`,
                            options: shuffled,
                            correct: correctIndex === -1 ? 0 : correctIndex
                        };
                    },
                    (idx) => { // output of code snippet (simple)
                        const snippets = [
                            { q: 'console.log(2 + "2")', opts: ['4', '"22"', '22', 'undefined'], correct: 1 },
                            { q: 'typeof null', opts: ['"null"', '"object"', '"undefined"', '"boolean"'], correct: 1 },
                            { q: 'Boolean("false")', opts: ['true', 'false', 'undefined', 'Error'], correct: 0 },
                            { q: '[] + []', opts: ['""', '0', 'NaN', '[]'], correct: 0 },
                            { q: '1 +  +"2" + "3"', opts: ['"33"', '6', '"123"', '"33"'], correct: 0 },
                        ];
                        const s = snippets[idx % snippets.length];
                        return { question: `What is the output of ${s.q} in JavaScript?`, options: s.opts, correct: s.correct };
                    },
                    (idx) => { // hardware component
                        const comps = ['CPU', 'GPU', 'RAM', 'PSU', 'Motherboard', 'SSD', 'HDD', 'Cooler', 'ROM', 'CMOS'];
                        const comp = comps[idx % comps.length];
                        const funcs = ['Processing', 'Graphics', 'Storage', 'Power', 'Cooling', 'Memory', 'Computing', 'Display', 'Audio', 'Network'];
                        const opts = [funcs[idx % funcs.length], funcs[(idx+1)%funcs.length], funcs[(idx+2)%funcs.length], funcs[(idx+3)%funcs.length]];
                        const correct = idx % 4;
                        return {
                            question: `Primary function of a ${comp}?`,
                            options: opts,
                            correct: correct
                        };
                    },
                    (idx) => { // db query
                        const dbs = dbTech[idx % dbTech.length];
                        const opts = [`SELECT * FROM users`, `INSERT INTO users`, `DROP TABLE users`, `DELETE FROM users`];
                        return { question: `Which SQL command retrieves all records from a table?`, options: opts, correct: 0 };
                    },
                    (idx) => { // cloud provider
                        const provider = cloud[idx % cloud.length];
                        const opts = [provider, cloud[(idx+2)%cloud.length], cloud[(idx+4)%cloud.length], cloud[(idx+6)%cloud.length]];
                        const correct = 0;
                        return { question: `Which cloud provider offers Lambda functions? (trick: all have similar)`, options: opts, correct: 0 };
                    },
                    (idx) => { // OS concept
                        const os = osNames[idx % osNames.length];
                        const opts = [os, osNames[(idx+1)%osNames.length], osNames[(idx+2)%osNames.length], osNames[(idx+3)%osNames.length]];
                        return { question: `Which operating system is open-source? (pick any)`, options: opts, correct: idx % 4 };
                    },
                    (idx) => { // networking
                        const protocols = ['TCP', 'UDP', 'HTTP', 'FTP', 'SMTP', 'ICMP', 'ARP', 'DHCP'];
                        const p = protocols[idx % protocols.length];
                        const opts = ['Transmission Control Protocol', 'User Datagram Protocol', 'Internet Control Message Protocol', 'Dynamic Host Configuration Protocol'];
                        const correct = idx % 4;
                        return { question: `What does ${p} stand for?`, options: opts, correct: correct };
                    },
                ];
                // generate 1000 questions by cycling patterns and adding slight variation
                for (let i = 0; i < 1000; i++) {
                    const pattern = patterns[i % patterns.length];
                    let q = pattern(i);
                    // Add a unique marker so no two questions are identical (even if pattern returns similar)
                    q.question = q.question + ` (variant ${Math.floor(i/10)+1})`; // ensure 'uniqueness' across 1000
                    // make sure options are always array length 4
                    while (q.options.length < 4) q.options.push('Placeholder');
                    q.id = i;
                    bank.push(q);
                }
                return bank;
            }

            // ---------- GLOBAL STATE ----------
            const QUESTION_BANK = generateQuestionBank(); // 1000 ready
            const TEST_SIZE = 50;

            let currentTestQuestions = [];        // array of 50 question objects (selected from bank)
            let userAnswers = new Array(TEST_SIZE).fill(null);  // index of selected option per question
            let currentIndex = 0;
            let testFinished = false;
            let timerInterval = null;
            let secondsElapsed = 0;
            let startTime = null;

            // DOM elements
            const testView = document.getElementById('testView');
            const resultView = document.getElementById('resultView');
            const questionText = document.getElementById('questionText');
            const optionsContainer = document.getElementById('optionsContainer');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');
            const newTestBtn = document.getElementById('newTestBtn');
            const restartFromResultsBtn = document.getElementById('restartFromResultsBtn');
            const questionCounter = document.getElementById('questionCounter');
            const progressFill = document.getElementById('progressFill');
            const timerDisplay = document.getElementById('timerDisplay');
            const darkToggle = document.getElementById('darkToggle');
            const finalScore = document.getElementById('finalScore');
            const resultsList = document.getElementById('resultsList');

            // ---------- HELPER FUNCTIONS ----------
            function formatTime(sec) {
                const mins = Math.floor(sec / 60).toString().padStart(2, '0');
                const secs = (sec % 60).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            }

            function startTimer() {
                if (timerInterval) clearInterval(timerInterval);
                secondsElapsed = 0;
                timerDisplay.textContent = formatTime(0);
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    if (!testFinished) {
                        secondsElapsed = Math.floor((Date.now() - startTime) / 1000);
                        timerDisplay.textContent = formatTime(secondsElapsed);
                    }
                }, 200);
            }

            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            // pick 50 random distinct questions from bank
            function pickRandomQuestions() {
                const shuffled = [...QUESTION_BANK].sort(() => 0.5 - Math.random()); // simple shuffle
                return shuffled.slice(0, TEST_SIZE);
            }

            // reset state with new questions
            function resetTest() {
                stopTimer();
                currentTestQuestions = pickRandomQuestions();
                userAnswers = new Array(TEST_SIZE).fill(null);
                currentIndex = 0;
                testFinished = false;
                startTimer();
                renderQuestion();
                updateProgressAndCounter();
                testView.classList.remove('hidden');
                resultView.classList.add('hidden');
            }

            function renderQuestion() {
                if (testFinished || !currentTestQuestions.length) return;
                const q = currentTestQuestions[currentIndex];
                questionText.textContent = q.question;
                const optionsHtml = q.options.map((opt, idx) => {
                    const selectedAttr = (userAnswers[currentIndex] === idx) ? 'selected' : '';
                    return `
                        <label class="option-item ${selectedAttr}">
                            <span class="option-prefix">${String.fromCharCode(65 + idx)}</span>
                            <input type="radio" name="option" value="${idx}" ${userAnswers[currentIndex] === idx ? 'checked' : ''}>
                            ${opt}
                        </label>
                    `;
                }).join('');
                optionsContainer.innerHTML = optionsHtml;

                // attach click listeners to labels for visual update + selection
                document.querySelectorAll('.option-item').forEach(label => {
                    label.addEventListener('click', (e) => {
                        // remove selected from all
                        document.querySelectorAll('.option-item').forEach(l => l.classList.remove('selected'));
                        label.classList.add('selected');
                        const radio = label.querySelector('input[type="radio"]');
                        radio.checked = true;
                        // store answer
                        userAnswers[currentIndex] = parseInt(radio.value);
                        updateProgressAndCounter(); // update progress bar maybe
                    });
                });

                // handle prev/next buttons state
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === TEST_SIZE - 1;
            }

            function updateProgressAndCounter() {
                const answeredCount = userAnswers.filter(a => a !== null).length;
                const percent = (answeredCount / TEST_SIZE) * 100;
                progressFill.style.width = `${percent}%`;
                questionCounter.textContent = `${currentIndex+1} / ${TEST_SIZE}`;
            }

            function showResults() {
                stopTimer();
                testFinished = true;
                testView.classList.add('hidden');
                resultView.classList.remove('hidden');

                // calculate score
                let correctCount = 0;
                const resultItems = [];
                currentTestQuestions.forEach((q, idx) => {
                    const userAns = userAnswers[idx];
                    const isCorrect = (userAns === q.correct);
                    if (isCorrect) correctCount++;
                    const correctOption = q.options[q.correct];
                    const userOption = userAns !== null ? q.options[userAns] : '⚠️ Not answered';
                    resultItems.push(`
                        <div class="result-item ${isCorrect ? 'correct' : 'wrong'}">
                            <div class="result-question">Q${idx+1}: ${q.question}</div>
                            <div class="result-answer">
                                <span>✅ Correct: ${correctOption}</span>
                                <span>📌 Your answer: ${userOption}</span>
                            </div>
                        </div>
                    `);
                });
                finalScore.textContent = `${correctCount} / ${TEST_SIZE}`;
                resultsList.innerHTML = resultItems.join('');
            }

            // ---------- EVENT LISTENERS ----------
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderQuestion();
                    updateProgressAndCounter();
                }
            });

            nextBtn.addEventListener('click', () => {
                if (currentIndex < TEST_SIZE - 1) {
                    currentIndex++;
                    renderQuestion();
                    updateProgressAndCounter();
                }
            });

            submitBtn.addEventListener('click', () => {
                if (confirm('Finish test and see results?')) {
                    showResults();
                }
            });

            newTestBtn.addEventListener('click', () => {
                resetTest();
            });

            restartFromResultsBtn.addEventListener('click', () => {
                resetTest();
            });

            darkToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                darkToggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
            });

            // initialize first test
            resetTest();

            // ensure that if user clicks label, answer stored (already inside render)

        })();
    </script>
